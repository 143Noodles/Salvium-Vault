apply plugin: 'com.android.application'

def isFdroidBuild = (project.findProperty("fdroidBuild") ?: System.getenv("FDROID_BUILD")) == "true"
def contentUpdatesEnabled = !isFdroidBuild && (project.findProperty("SALVIUM_CONTENT_UPDATES_ENABLED")
        ?: System.getenv("SALVIUM_CONTENT_UPDATES_ENABLED") ?: "false") == "true"
def bundledRuntime = (project.findProperty("SALVIUM_BUNDLED") ?: System.getenv("SALVIUM_BUNDLED")) == "1"
def contentUpdateManifestUrl = project.findProperty("SALVIUM_CONTENT_UPDATE_MANIFEST_URL")
        ?: System.getenv("SALVIUM_CONTENT_UPDATE_MANIFEST_URL")
        ?: "https://github.com/143Noodles/Salvium-Vault/releases/latest/download/android-content-manifest.json"

android {
    namespace = "tools.salvium"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "tools.salvium"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 4
        versionName "1.1.1"
        buildConfigField "boolean", "CONTENT_UPDATES_ENABLED", contentUpdatesEnabled ? "true" : "false"
        buildConfigField "boolean", "BUNDLED_RUNTIME", bundledRuntime ? "true" : "false"
        buildConfigField "String", "CONTENT_UPDATE_MANIFEST_URL", '"' + contentUpdateManifestUrl.replace('\\', '\\\\').replace('"', '\\"') + '"'
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildFeatures {
        buildConfig true
    }
    signingConfigs {
        release {
            def releaseStoreFile = project.findProperty("SALVIUM_RELEASE_STORE_FILE") ?: System.getenv("SALVIUM_RELEASE_STORE_FILE")
            def releaseStorePassword = project.findProperty("SALVIUM_RELEASE_STORE_PASSWORD") ?: System.getenv("SALVIUM_RELEASE_STORE_PASSWORD")
            def releaseKeyAlias = project.findProperty("SALVIUM_RELEASE_KEY_ALIAS") ?: System.getenv("SALVIUM_RELEASE_KEY_ALIAS")
            def releaseKeyPassword = project.findProperty("SALVIUM_RELEASE_KEY_PASSWORD") ?: System.getenv("SALVIUM_RELEASE_KEY_PASSWORD")

            if (releaseStoreFile) {
                storeFile file(releaseStoreFile)
            }
            storePassword releaseStorePassword
            keyAlias releaseKeyAlias
            keyPassword releaseKeyPassword
        }
    }
    buildTypes {
        debug {
            // Keep physical-device QA entirely separate from a user's signed
            // production install and its wallet data.
            applicationIdSuffix ".qa"
            versionNameSuffix "-qa"
        }
        release {
            minifyEnabled false
            if (!isFdroidBuild
                    && (project.findProperty("SALVIUM_RELEASE_STORE_FILE") ?: System.getenv("SALVIUM_RELEASE_STORE_FILE"))
                    && (project.findProperty("SALVIUM_RELEASE_STORE_PASSWORD") ?: System.getenv("SALVIUM_RELEASE_STORE_PASSWORD"))
                    && (project.findProperty("SALVIUM_RELEASE_KEY_ALIAS") ?: System.getenv("SALVIUM_RELEASE_KEY_ALIAS"))
                    && (project.findProperty("SALVIUM_RELEASE_KEY_PASSWORD") ?: System.getenv("SALVIUM_RELEASE_KEY_PASSWORD"))) {
                signingConfig signingConfigs.release
            }
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    // Android exposes Ed25519 only through AndroidKeyStore and cannot verify an
    // imported release key. This small pure-Java verifier keeps Android content
    // releases on the same pinned signing key as the desktop updater.
    implementation "net.i2p.crypto:eddsa:0.3.0"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

if (!isFdroidBuild) {
    try {
        def servicesJSON = file('google-services.json')
        if (servicesJSON.text) {
            apply plugin: 'com.google.gms.google-services'
        }
    } catch(Exception e) {
        logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
    }
}
