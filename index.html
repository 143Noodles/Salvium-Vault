<!DOCTYPE html>
<html lang="en" style="background-color:#0f0f1a;">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="description" content="Salvium Vault - Private Web Wallet for Salvium (SAL)">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://vault.salvium.tools/" />
  <link rel="icon" type="image/png" href="/salvium-icon.png" />
  <meta property="og:title" content="Salvium Vault">
  <meta property="og:description" content="Private Web Wallet for Salvium (SAL)">
  <meta property="og:url" content="https://vault.salvium.tools/">
  <title>Salvium Vault</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="/salvium-icon.png?v=4">
  <meta name="apple-mobile-web-app-title" content="Salvium Vault">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="color-scheme" content="dark">

  <link href="./assets/css/modern.css" rel="stylesheet">

  <!-- Tailwind CSS -->

  <style>
    html, body {
      background-color: #0f0f1a;
      color: #f8fafc;
    }
    body {
      background-image:
        radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.03) 0%, transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.03) 0%, transparent 25%);
    }

    /* Clean scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #6366f1;
    }

    .glass-panel {
      background: #131320;
      /* Solid dark background like screenshot */
      border: 1px solid rgba(255, 255, 255, 0.08);
      /* Crisp neutral border */
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "recharts": "https://esm.sh/recharts@^3.6.0"
  }
}
</script>
</head>

<body style="background-color:#0f0f1a;">
  <!-- Site Header - Hidden on Mobile via JS -->
  <header class="header" id="staticHeader">
    <div class="header-content">
      <a href="https://salvium.tools" class="logo">
        <img src="/assets/img/salvium.png" alt="Salvium Logo" />
        <span class="logo-text">SALVIUM VAULT</span>
      </a>
      <ul class="top-nav">
        <li><a href="https://explorer.salvium.tools">Explorer</a></li>
        <li><a href="https://vault.salvium.tools">Vault</a></li>
        <li><a href="https://pool.salvium.tools" target="_blank">Pool</a></li>
        <li>
          <a href="https://www.coingecko.com/en/coins/salvium" target="_blank">
            <span id="priceData" class="price-badge">Loading...</span>
          </a>
        </li>
      </ul>
    </div>
  </header>

  <script>
    (function () {
      var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Tablet|Kindle|Silk|PlayBook/i.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      if (isMobile) {
        var header = document.getElementById('staticHeader');
        if (header) header.style.display = 'none';
      }
    })();

    // Desktop app: hide the web-only shortcuts (Explorer / Vault / Pool); the
    // sidecar sets window.__SALVIUM_DESKTOP__. Logo + price badge stay.
    (function () {
      if (window.__SALVIUM_DESKTOP__ !== true) return;
      var sel = '.top-nav a[href*="explorer.salvium.tools"], .top-nav a[href*="vault.salvium.tools"], .top-nav a[href*="pool.salvium.tools"]';
      document.querySelectorAll(sel).forEach(function (a) {
        var li = a.closest('li');
        if (li) li.style.display = 'none';
      });
    })();

    (function() {
      var root = document.documentElement;
      var stableAppHeight = Math.max(window.innerHeight || 0, root.clientHeight || 0, 1);
      var lastWidth = window.innerWidth || root.clientWidth || 0;
      var isNativeCapacitorApp = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
      var isAndroidWebView = /; wv\)/i.test(navigator.userAgent || '');

      try {
        if (!isNativeCapacitorApp && !isAndroidWebView && 'virtualKeyboard' in navigator && navigator.virtualKeyboard) {
          navigator.virtualKeyboard.overlaysContent = true;
        }
      } catch (e) {
        // Older WebViews may expose a partial VirtualKeyboard API.
      }

      function isEditableFocused() {
        var active = document.activeElement;
        if (!active || !active.tagName) return false;
        return /^(INPUT|TEXTAREA|SELECT)$/i.test(active.tagName);
      }

      function updateAppHeight() {
        var nextHeight = Math.max(window.innerHeight || 0, root.clientHeight || 0, 1);
        var nextWidth = window.innerWidth || root.clientWidth || 0;
        var widthChanged = Math.abs(nextWidth - lastWidth) > 48;
        if (widthChanged) {
          stableAppHeight = nextHeight;
          lastWidth = nextWidth;
        }

        var viewport = window.visualViewport;
        var viewportKeyboardInset = viewport
          ? Math.max(0, stableAppHeight - viewport.height - (viewport.offsetTop || 0))
          : 0;
        var innerHeightDrop = Math.max(0, stableAppHeight - nextHeight);
        var keyboardOpen = isEditableFocused() && (viewportKeyboardInset > 96 || innerHeightDrop > 96);

        if (!keyboardOpen) {
          stableAppHeight = Math.max(stableAppHeight, nextHeight);
        }

        var appHeight = keyboardOpen && !isNativeCapacitorApp ? stableAppHeight : nextHeight;
        root.style.setProperty('--app-height', appHeight + 'px');
        root.classList.toggle('keyboard-open', keyboardOpen);
      }

      updateAppHeight();
      window.addEventListener('resize', updateAppHeight);
      window.addEventListener('orientationchange', function() {
        stableAppHeight = Math.max(window.innerHeight || 0, root.clientHeight || 0, 1);
        lastWidth = window.innerWidth || root.clientWidth || 0;
        updateAppHeight();
        setTimeout(updateAppHeight, 250);
      });
      window.visualViewport && window.visualViewport.addEventListener('resize', updateAppHeight);
      window.visualViewport && window.visualViewport.addEventListener('scroll', updateAppHeight);
      document.addEventListener('focusin', updateAppHeight);
      document.addEventListener('focusout', function() {
        setTimeout(updateAppHeight, 120);
      });
    })();
  </script>

  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    async function fetchPriceData() {
      try {
        // Use server-side proxy to avoid CORS issues
        const response = await fetch('/api/price');
        const data = await response.json();
        if (data.success && data.price) {
          const price = parseFloat(data.price);
          const priceEl = document.getElementById('priceData');
          if (priceEl) {
            priceEl.textContent = `$${price.toFixed(6)}`;
            priceEl.className = 'price-badge';
          }
        }
      } catch (e) {
        const priceEl = document.getElementById('priceData');
        if (priceEl) priceEl.textContent = 'Price N/A';
      }
    }
    if (!(/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Tablet|Kindle|Silk|PlayBook/i.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1))) {
      fetchPriceData();
      setInterval(fetchPriceData, 120000);
    }
  </script>
</body>

</html>
